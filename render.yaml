services:
  - type: web
    name: ai-interview-coach-api
    runtime: python
    plan: free

    rootDir: backend

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.2"

      - key: DATABASE_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"

      - key: GEMINI_API_KEY
        sync: false

      - key: GEMINI_MODEL
        value: gemini-2.5-flash

      - key: GROQ_API_KEY
        sync: false

      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      - key: OPENROUTER_API_KEY
        sync: false

      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.3-70b-instruct

      - key: FRONTEND_URL
        value: http://localhost:5173

      - key: MAX_UPLOAD_MB
        value: "10"

      - key: UPLOAD_DIR
        value: ./uploads

      - key: WHISPER_MODEL_SIZE
        value: base

      - key: WHISPER_COMPUTE_TYPE
        value: int8

      - key: WHISPER_DEVICE
        value: cpu
